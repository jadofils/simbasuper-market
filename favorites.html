<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Favorites — Simba Supermarket</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <!-- LEFT: Logo & Category Menu -->
    <div class="nav-left">
      <a href="index.html" class="logo">
        <i class="fas fa-shopping-bag logo-icon"></i>
        <span class="logo-text">Simba</span>
      </a>
      <button class="categories-menu-btn" id="categoriesMenuBtn">
        <i class="fas fa-bars"></i>
        <span>Categories</span>
      </button>
    </div>

    <!-- CENTER: Search Bar -->
    <div class="nav-center">
      <div class="search-bar">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off" />
        <button class="search-btn">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </div>

    <!-- RIGHT: Actions -->
    <div class="nav-right">
      <a href="favorites.html" class="nav-icon-btn active" title="Favorites">
        <i class="fas fa-heart"></i>
        <span class="nav-badge" id="favoritesBadge">0</span>
      </a>
      
      <select id="langSelect" class="lang-select">
        <option value="en">🇬🇧 EN</option>
        <option value="fr">🇫🇷 FR</option>
        <option value="rw">🇷🇼 RW</option>
      </select>
      
      <button id="themeToggle" class="nav-icon-btn" title="Toggle dark mode">
        <i class="fas fa-moon"></i>
      </button>
      
      <a href="cart.html" class="cart-btn">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" id="cartBadge">0</span>
        <span class="cart-text">Cart</span>
      </a>
    </div>
  </div>
  
  <!-- Mobile Bottom Nav -->
  <div class="mobile-nav">
    <a href="index.html" class="mobile-nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <button class="mobile-nav-item" id="mobileCategoriesBtn">
      <i class="fas fa-th-large"></i>
      <span>Categories</span>
    </button>
    <a href="favorites.html" class="mobile-nav-item active">
      <i class="fas fa-heart"></i>
      <span>Favorites</span>
    </a>
    <a href="cart.html" class="mobile-nav-item">
      <i class="fas fa-shopping-cart"></i>
      <span>Cart</span>
      <span class="mobile-badge" id="mobileCartBadge">0</span>
    </a>
  </div>
</nav>

<!-- FAVORITES PAGE -->
<div class="favorites-page">
  <div class="favorites-header">
    <div class="favorites-title-section">
      <h1><i class="fas fa-heart"></i> My Favorites</h1>
      <p id="favoritesCount">0 items saved</p>
    </div>
    <div class="favorites-actions">
      <button class="btn-outline" id="clearAllBtn">
        <i class="fas fa-trash"></i> Clear All
      </button>
      <button class="btn-primary" id="addAllToCartBtn">
        <i class="fas fa-cart-plus"></i> Add All to Cart
      </button>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="favorites-tabs">
    <button class="favorites-tab active" data-filter="all">
      <i class="fas fa-th"></i> All <span class="tab-count" id="allCount">0</span>
    </button>
    <button class="favorites-tab" data-filter="Cosmetics & Personal Care">
      <i class="fas fa-spray-can"></i> Cosmetics <span class="tab-count" id="cosmeticsCount">0</span>
    </button>
    <button class="favorites-tab" data-filter="Food Products">
      <i class="fas fa-apple-alt"></i> Food <span class="tab-count" id="foodCount">0</span>
    </button>
    <button class="favorites-tab" data-filter="Alcoholic Drinks">
      <i class="fas fa-wine-bottle"></i> Drinks <span class="tab-count" id="drinksCount">0</span>
    </button>
    <button class="favorites-tab" data-filter="Kitchenware & Electronics">
      <i class="fas fa-blender"></i> Kitchen <span class="tab-count" id="kitchenCount">0</span>
    </button>
    <button class="favorites-tab" data-filter="other">
      <i class="fas fa-ellipsis-h"></i> Other <span class="tab-count" id="otherCount">0</span>
    </button>
  </div>

  <!-- Sort Options -->
  <div class="favorites-sort">
    <select id="favoritesSort" class="filter-select">
      <option value="recent">Recently Added</option>
      <option value="name">Name A-Z</option>
      <option value="price-low">Price: Low to High</option>
      <option value="price-high">Price: High to Low</option>
    </select>
  </div>

  <!-- Products Grid -->
  <div class="favorites-grid" id="favoritesGrid">
    <!-- Products will be loaded here -->
  </div>

  <!-- Empty State -->
  <div class="empty-favorites" id="emptyFavorites" style="display: none;">
    <div class="empty-icon">
      <i class="fas fa-heart-broken"></i>
    </div>
    <h2>No Favorites Yet</h2>
    <p>Start adding products you love to see them here!</p>
    <a href="index.html" class="btn-primary">
      <i class="fas fa-shopping-bag"></i> Browse Products
    </a>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <div>
      <div class="footer-logo">
        <i class="fas fa-shopping-bag"></i>
        <span class="logo-text">Simba Supermarket</span>
      </div>
      <p><i class="fas fa-map-marker-alt"></i> Kigali, Rwanda</p>
    </div>
    <div>
      <p><i class="fas fa-phone"></i> +250 788 000 000</p>
      <p><i class="fas fa-envelope"></i> info@simbasupermarket.rw</p>
    </div>
    <div>
      <p id="footerRights">© 2025 Simba Supermarket. All rights reserved.</p>
    </div>
  </div>
</footer>

<script src="app.js"></script>
<script src="favorites.js"></script>
</body>
</html>
