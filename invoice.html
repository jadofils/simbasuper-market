<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice - Simba Supermarket</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .invoice-page {
      max-width: 900px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--card-bg);
      border-radius: 16px;
      border: 1.5px solid var(--border);
    }
    .invoice-header {
      text-align: center;
      border-bottom: 2px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }
    .invoice-header h1 {
      color: var(--primary);
      margin: 0;
      font-size: 2rem;
    }
    .invoice-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .detail-box {
      background: var(--bg);
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .detail-box h3 {
      margin: 0 0 1rem 0;
      color: var(--primary);
      font-size: 1.1rem;
    }
    .detail-box p {
      margin: 0.5rem 0;
      color: var(--text-body);
    }
    .invoice-table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
    }
    .invoice-table th {
      background: var(--primary);
      color: white;
      padding: 1rem;
      text-align: left;
      font-weight: 600;
    }
    .invoice-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text-body);
    }
    .invoice-totals {
      margin-top: 2rem;
      display: flex;
      justify-content: flex-end;
    }
    .totals-table {
      width: 350px;
    }
    .totals-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .totals-row.total {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--primary);
      border-top: 2px solid var(--border);
      border-bottom: none;
      margin-top: 0.5rem;
    }
    .invoice-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 2px solid var(--border);
    }
    @media (max-width: 768px) {
      .invoice-details {
        grid-template-columns: 1fr;
      }
      .invoice-page {
        padding: 1rem;
        margin: 1rem;
      }
      .invoice-table {
        font-size: 0.9rem;
      }
      .invoice-table th,
      .invoice-table td {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-left">
        <a href="index.html" class="logo">
          <i class="fas fa-shopping-bag logo-icon"></i>
          <span class="logo-text">Simba</span>
        </a>
      </div>
      <div class="nav-right">
        <select id="langSelect" class="lang-select">
          <option value="en">🇬🇧 EN</option>
          <option value="fr">🇫🇷 FR</option>
          <option value="rw">🇷🇼 RW</option>
        </select>
        <button id="themeToggle" class="nav-icon-btn" title="Toggle dark mode">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="invoice-page" id="invoiceContent">
    <!-- Invoice content will be injected here -->
  </div>

  <script src="app.js"></script>
  <script>
    // Get invoice data from sessionStorage
    const invoiceData = JSON.parse(sessionStorage.getItem('invoiceData'));
    
    if (!invoiceData) {
      window.location.href = 'cart.html';
    } else {
      renderInvoice(invoiceData);
    }
    
    function renderInvoice(data) {
      const container = document.getElementById('invoiceContent');
      
      const html = `
        <div class="invoice-header">
          <h1><i class="fas fa-shopping-bag"></i> SIMBA SUPERMARKET</h1>
          <p style="color: var(--text-light); margin: 0.5rem 0;">INVOICE</p>
        </div>
        
        <div class="invoice-details">
          <div class="detail-box">
            <h3><i class="fas fa-user"></i> Customer Details</h3>
            <p><strong>Name:</strong> ${data.customer.name}</p>
            <p><strong>Phone:</strong> ${data.customer.phone}</p>
            <p><strong>Address:</strong> ${data.customer.address}</p>
          </div>
          <div class="detail-box">
            <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
            <p>${data.paymentMethod === 'momo' ? '<i class="fas fa-mobile-alt"></i> MTN Mobile Money' : data.paymentMethod === 'airtel' ? '<i class="fas fa-mobile-alt"></i> Airtel Money' : '<i class="fas fa-money-bill-wave"></i> Cash on Delivery'}</p>
          </div>
        </div>
        
        <h3 style="color: var(--text); margin-bottom: 1rem;"><i class="fas fa-shopping-cart"></i> Order Items</h3>
        <table class="invoice-table">
          <thead>
            <tr>
              <th>Item</th>
              <th style="text-align: center;">Qty</th>
              <th style="text-align: right;">Price</th>
              <th style="text-align: right;">Total</th>
            </tr>
          </thead>
          <tbody>
            ${data.items.map(item => `
              <tr>
                <td>${item.name}</td>
                <td style="text-align: center;">${item.quantity}</td>
                <td style="text-align: right;">${formatPrice(item.price)}</td>
                <td style="text-align: right;">${formatPrice(item.price * item.quantity)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        
        <div class="invoice-totals">
          <div class="totals-table">
            <div class="totals-row">
              <span>Subtotal:</span>
              <span>${formatPrice(data.subtotal)}</span>
            </div>
            ${data.discount > 0 ? `
            <div class="totals-row" style="color: var(--success);">
              <span><i class="fas fa-gift"></i> Discount (${data.discountPercent}%):</span>
              <span>-${formatPrice(data.discount)}</span>
            </div>
            ` : ''}
            <div class="totals-row">
              <span>Delivery:</span>
              <span>${formatPrice(data.delivery)}</span>
            </div>
            <div class="totals-row total">
              <span>TOTAL:</span>
              <span>${formatPrice(data.total)}</span>
            </div>
          </div>
        </div>
        
        <div class="invoice-actions">
          <button class="btn-outline" onclick="window.history.back()" style="flex: 1;">
            <i class="fas fa-arrow-left"></i> Back
          </button>
          <button class="btn-primary" onclick="confirmAndPay()" style="flex: 2;">
            <i class="fas fa-check"></i> Confirm & Pay
          </button>
        </div>
      `;
      
      container.innerHTML = html;
    }
    
    function formatPrice(price) {
      return `${price.toLocaleString()} RWF`;
    }
    
    function confirmAndPay() {
      // Store that user confirmed invoice
      sessionStorage.setItem('invoiceConfirmed', 'true');
      window.location.href = 'cart.html';
    }
  </script>
</body>
</html>
