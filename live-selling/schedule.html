// Render functions
function renderLiveNow() {
  const grid = document.getElementById('liveNowGrid');
  const section = document.getElementById('liveNowSection');
  
  if (scheduleData.liveNow.length === 0) {
    section.style.display = 'none';
    return;
  }
  
  grid.innerHTML = scheduleData.liveNow.map(session => `
    <a href="index.html?session=${session.id}" class="schedule-card live-card">
      <div class="card-thumbnail">
        <img src="${session.thumbnail}" alt="${session.title}">
        <div class="live-badge">
          <span class="live-dot"></span>
          LIVE
        </div>
        <div class="viewer-badge">
          <i class="fas fa-eye"></i> ${session.viewers.toLocaleString()}
        </div>
      </div>
      <div class="card-content">
        <h3>${session.title}</h3>
        <div class="host-info-small">
          <img src="${session.hostAvatar}" alt="${session.host}">
          <span>${session.host}</span>
        </div>
        <button class="btn-primary full-width" onclick="event.preventDefault(); joinLive(${session.id})">
          <i class="fas fa-sign-in-alt"></i> Join Live Now
        </button>
      </div>
    </a>
  `).join('');
}

function renderUpcoming() {
  const grid = document.getElementById('upcomingGrid');
  
  grid.innerHTML = scheduleData.upcoming.map(session => {
    const countdown = getCountdown(session.scheduledTime);
    return `
    <div class="schedule-card">
      <div class="card-thumbnail">
        <img src="${session.thumbnail}" alt="${session.title}">
        <div class="countdown-badge" id="countdown-${session.id}">
          ${countdown}
        </div>
      </div>
      <div class="card-content">
        <h3>${session.title}</h3>
        <div class="host-info-small">
          <img src="${session.hostAvatar}" alt="${session.host}">
          <span>${session.host}</span>
        </div>
        <div class="session-time">
          <i class="fas fa-clock"></i>
          ${formatDateTime(session.scheduledTime)}
        </div>
        <button class="btn-outline full-width" onclick="setReminder(${session.id})">
          <i class="fas fa-bell"></i> Set Reminder (${session.reminders})
        </button>
      </div>
    </div>
  `;
  }).join('');
  
  // Start countdown timers
  startCountdowns();
}

function getCountdown(targetTime) {
  const now = new Date();
  const diff = targetTime - now;
  
  if (diff <= 0) return 'Starting soon...';
  
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  
  if (days > 0) {
    return `${days}d ${hours}h ${minutes}m`;
  } else if (hours > 0) {
    return `${hours}h ${minutes}m ${seconds}s`;
  } else {
    return `${minutes}m ${seconds}s`;
  }
}

function startCountdowns() {
  setInterval(() => {
    scheduleData.upcoming.forEach(session => {
      const countdownEl = document.getElementById(`countdown-${session.id}`);
      if (countdownEl) {
        countdownEl.textContent = getCountdown(session.scheduledTime);
      }
    });
  }, 1000);
}

function renderPast() {
  const grid = document.getElementById('pastGrid');
  
  grid.innerHTML = scheduleData.past.map(session => `
    <div class="schedule-card" onclick="watchArchive(${session.id})" style="cursor: pointer;">
      <div class="card-thumbnail">
        <img src="${session.thumbnail}" alt="${session.title}">
        <div class="play-overlay">
          <i class="fas fa-play-circle"></i>
        </div>
        <div class="duration-badge">${session.duration}</div>
      </div>
      <div class="card-content">
        <h3>${session.title}</h3>
        <div class="host-info-small">
          <img src="${session.hostAvatar}" alt="${session.host}">
          <span>${session.host}</span>
        </div>
        <div class="session-stats">
          <span><i class="fas fa-eye"></i> ${session.views.toLocaleString()} views</span>
          <span>${session.date}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function watchArchive(sessionId) {
  const session = scheduleData.past.find(s => s.id === sessionId);
  if (session) {
    localStorage.setItem('archiveSession', JSON.stringify(session));
    window.location.href = 'archive.html?id=' + sessionId;
  }
}

function renderHosts() {
  const grid = document.getElementById('hostsGrid');
  
  grid.innerHTML = topHosts.map(host => `
    <div class="host-card">
      <img src="${host.avatar}" alt="${host.name}" class="host-card-avatar">

}

// Helper functions
function formatTimeUntil(date) {
  const diff = date - new Date();
  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  
  if (hours > 24) {
    return `in ${Math.floor(hours / 24)} days`;
  } else if (hours > 0) {
    return `in ${hours}h ${minutes}m`;
  } else {
    return `in ${minutes}m`;
  }
}

function formatDateTime(date) {
  return date.toLocaleString('en-US', {
    weekday: 'short',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

function setReminder(sessionId) {
  showToast('Reminder set! We\'ll notify you when the session starts.');
}

function joinLive(sessionId) {
  // Store session ID and redirect to live page
  localStorage.setItem('currentLiveSession', sessionId);
  window.location.href = 'index.html?session=' + sessionId;
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  const icon = document.querySelector('#themeToggle i');
  if (icon) icon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  // Load theme
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  const themeIcon = document.querySelector('#themeToggle i');
  if (themeIcon) themeIcon.className = savedTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  
  // Theme toggle
  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
  
  // Render all sections
  renderLiveNow();
  renderUpcoming();
  renderPast();
  renderHosts();
  
  // Update cart badge
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
  const badge = document.getElementById('cartBadge');
  if (badge) badge.textContent = totalItems;
  
  // Update login link based on auth status
  const loginLink = document.getElementById('loginLink');
  if (loginLink && typeof isAuthenticated === 'function' && isAuthenticated()) {
    loginLink.innerHTML = '<i class="fas fa-user-circle"></i><span>Admin</span>';
    loginLink.href = 'admin-dashboard.html';
  }
});
