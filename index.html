<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simba Supermarket — Rwanda's Online Supermarket</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <i class="fas fa-shopping-bag logo-icon"></i>
      <span class="logo-text">Simba</span>
    </a>

    <div class="search-bar">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off" />
    </div>

    <div class="nav-actions">
      <select id="langSelect" class="lang-select">
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="rw">RW</option>
      </select>
      <button id="themeToggle" class="icon-btn" title="Toggle dark mode">
        <i class="fas fa-moon"></i>
      </button>
      <a href="cart.html" class="cart-btn">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1 id="heroTitle">Rwanda's Favourite Online Supermarket</h1>
    <p id="heroSub">552 products. Fast delivery. Pay with MoMo.</p>
    <a href="#products" class="btn-primary" id="heroBtn">Shop Now</a>
  </div>
  <div class="hero-img">
    <i class="fas fa-store"></i>
  </div>
</section>

<!-- CATEGORIES -->
<section class="section" id="categories">
  <div class="section-header">
    <h2 class="section-title" id="catTitle">Shop by Category</h2>
    <div class="category-controls">
      <div class="search-bar-inline">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="categorySearch" placeholder="Search categories..." autocomplete="off" />
      </div>
      <select id="categorySort" class="filter-select">
        <option value="name">Sort by Name</option>
        <option value="count">Sort by Count</option>
      </select>
    </div>
  </div>
  <div class="categories-grid" id="categoriesGrid"></div>
</section>

<!-- PRODUCTS -->
<section class="section" id="products">
  <div class="products-header">
    <h2 class="section-title" id="productsTitle">All Products</h2>
    <div class="filters">
      <select id="categoryFilter" class="filter-select">
        <option value="">All Categories</option>
      </select>
      <select id="sortSelect" class="filter-select">
        <option value="">Sort by</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="name-asc">Name: A → Z</option>
      </select>
    </div>
  </div>
  <div class="products-grid" id="productsGrid"></div>
  <div class="load-more-wrap">
    <button class="btn-outline" id="loadMoreBtn">Load More</button>
  </div>
</section>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <div>
      <div class="footer-logo">
        <i class="fas fa-shopping-bag"></i>
        <span class="logo-text">Simba Supermarket</span>
      </div>
      <p><i class="fas fa-map-marker-alt"></i> Kigali, Rwanda</p>
    </div>
    <div>
      <p><i class="fas fa-phone"></i> +250 788 000 000</p>
      <p><i class="fas fa-envelope"></i> info@simbasupermarket.rw</p>
    </div>
    <div>
      <p id="footerRights">© 2025 Simba Supermarket. All rights reserved.</p>
    </div>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
