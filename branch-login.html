<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Branch Login — Simba Supermarket</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-card { max-width: 450px; width: 100%; background: var(--card-bg); border: 2px solid var(--border); border-radius: 20px; padding: 3rem; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    .login-header { text-align: center; margin-bottom: 2rem; }
    .login-icon { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--primary)); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: white; font-size: 2rem; }
    .login-header h1 { margin: 0 0 0.5rem 0; color: var(--text); font-size: 1.8rem; }
    .login-header p { color: var(--text-light); font-size: 0.95rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text); font-weight: 600; font-size: 0.9rem; }
    .form-input { width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; background: var(--surface); color: var(--text); transition: all 0.3s; }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .form-select { width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; background: var(--surface); color: var(--text); cursor: pointer; }
    .btn-login { width: 100%; padding: 1rem; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-login:hover { background: var(--primary); transform: translateY(-2px); }
    .login-footer { text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border); }
    .login-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">
        <i class="fas fa-user-tie"></i>
      </div>
      <h1>Branch Representative</h1>
      <p>Sign in to manage your branch</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="branch">Select Branch</label>
        <select id="branch" class="form-select" required>
          <option value="">Choose your branch...</option>
          <option value="kigali-city">Simba Kigali City Center</option>
          <option value="kimironko">Simba Kimironko</option>
          <option value="nyabugogo">Simba Nyabugogo</option>
          <option value="remera">Simba Remera</option>
          <option value="kicukiro">Simba Kicukiro</option>
          <option value="gikondo">Simba Gikondo</option>
        </select>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-input" placeholder="Enter your username" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password" required />
      </div>

      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="login-footer">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Store</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
<script>
  // Demo credentials: username: branch, password: simba123
  function handleLogin(e) {
    e.preventDefault();
    
    const branch = document.getElementById('branch').value;
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    // Simple authentication (in production, use proper backend authentication)
    if (username === 'branch' && password === 'simba123') {
      const branchData = {
        id: branch,
        username: username,
        loginTime: new Date().toISOString()
      };
      
      localStorage.setItem('branchAuth', JSON.stringify(branchData));
      showToast('Login successful! Redirecting...');
      
      setTimeout(() => {
        window.location.href = 'branch-dashboard.html';
      }, 1500);
    } else {
      showToast('Invalid credentials. Try: branch / simba123');
    }
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }
</script>

</body>
</html>
