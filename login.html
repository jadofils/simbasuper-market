<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Simba Supermarket</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      padding: 2rem 1rem;
    }
    .auth-box {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header .logo-icon {
      font-size: 3rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }
    .auth-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .auth-header p {
      color: var(--text-light);
    }
    .auth-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .auth-tab {
      flex: 1;
      padding: 0.75rem;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
    }
    .auth-tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    .form-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.2s;
      background: var(--bg);
      color: var(--text);
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(61, 82, 160, 0.1);
    }
    .error-msg {
      color: var(--danger);
      font-size: 0.875rem;
      margin-top: 0.5rem;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .role-selector {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .role-option {
      flex: 1;
      padding: 1rem;
      border: 2px solid var(--border);
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .role-option input {
      display: none;
    }
    .role-option.selected {
      border-color: var(--primary);
      background: var(--surface);
    }
    .role-option i {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-box">
    <div class="auth-header">
      <div class="logo-icon"><i class="fas fa-shopping-bag"></i></div>
      <h1>Simba Supermarket</h1>
      <p>Welcome back! Please login to continue</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="customer@simba.com" />
        <span class="error-msg" id="loginEmailError"></span>
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required placeholder="Enter your password" />
        <span class="error-msg" id="loginPasswordError"></span>
      </div>

      <button type="submit" class="btn-primary full-width">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
      
      <p style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-light); text-align: center;">
        Demo: customer@simba.com / Simba123 or admin@simba.com / Simba@123
      </p>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" required placeholder="Jean Pierre Habimana" />
        <span class="error-msg" id="regNameError"></span>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" required placeholder="email@example.com" />
        <span class="error-msg" id="regEmailError"></span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" required placeholder="Minimum 6 characters" />
        <span class="error-msg" id="regPasswordError"></span>
      </div>

      <button type="submit" class="btn-primary full-width">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">
      <a href="index.html"><i class="fas fa-arrow-left"></i> Continue as Guest</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // Initialize default accounts
  function initializeDefaultAccounts() {
    let users = JSON.parse(localStorage.getItem('users') || '[]');
    
    // Create default customer if doesn't exist
    const customerExists = users.some(u => u.email === 'customer@simba.com');
    if (!customerExists) {
      users.push({
        id: 'USER-CUSTOMER',
        name: 'Simba Customer',
        email: 'customer@simba.com',
        phone: '+250788111111',
        password: 'Simba123',
        role: 'customer',
        createdAt: new Date().toISOString()
      });
    }
    
    // Create default admin if doesn't exist
    const adminExists = users.some(u => u.email === 'admin@simba.com');
    if (!adminExists) {
      users.push({
        id: 'USER-ADMIN',
        name: 'Simba Admin',
        email: 'admin@simba.com',
        phone: '+250788000000',
        password: 'Simba@123',
        role: 'admin',
        createdAt: new Date().toISOString()
      });
    }
    
    localStorage.setItem('users', JSON.stringify(users));
  }

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
    
    if (tab === 'login') {
      document.querySelectorAll('.auth-tab')[0].classList.add('active');
      document.getElementById('loginForm').classList.add('active');
    } else {
      document.querySelectorAll('.auth-tab')[1].classList.add('active');
      document.getElementById('registerForm').classList.add('active');
    }
  }



  function handleLogin(e) {
    e.preventDefault();
    
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    const users = JSON.parse(localStorage.getItem('users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);
    
    if (user) {
      // Store session
      sessionStorage.setItem('currentUser', JSON.stringify(user));
      localStorage.setItem('isLoggedIn', 'true');
      
      showToast('Login successful! Redirecting...');
      
      setTimeout(() => {
        if (user.role === 'admin') {
          window.location.href = 'dashboard.html';
        } else {
          window.location.href = 'customer-dashboard.html';
        }
      }, 800);
    } else {
      showError('loginPasswordError', 'Invalid email or password');
    }
  }

  function handleRegister(e) {
    e.preventDefault();
    
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    
    // Validation
    if (password.length < 6) {
      showError('regPasswordError', 'Password must be at least 6 characters');
      return;
    }
    
    const users = JSON.parse(localStorage.getItem('users') || '[]');
    
    // Check if user exists
    if (users.some(u => u.email === email)) {
      showError('regEmailError', 'Email already registered');
      return;
    }
    
    // Create new user (always customer role)
    const newUser = {
      id: 'USER-' + Date.now(),
      name: name,
      email: email,
      phone: '',
      password: password,
      role: 'customer',
      createdAt: new Date().toISOString()
    };
    
    users.push(newUser);
    localStorage.setItem('users', JSON.stringify(users));
    
    // Auto login
    sessionStorage.setItem('currentUser', JSON.stringify(newUser));
    localStorage.setItem('isLoggedIn', 'true');
    
    showToast('Account created! Redirecting...');
    
    setTimeout(() => {
      window.location.href = 'customer-dashboard.html';
    }, 800);
  }

  function showError(elementId, message) {
    const errorEl = document.getElementById(elementId);
    errorEl.textContent = message;
    errorEl.classList.add('show');
    
    setTimeout(() => {
      errorEl.classList.remove('show');
    }, 3000);
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  // Check if already logged in
  function checkAlreadyLoggedIn() {
    const currentUser = sessionStorage.getItem('currentUser');
    if (currentUser) {
      const user = JSON.parse(currentUser);
      if (user.role === 'admin') {
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'customer-dashboard.html';
      }
    }
  }

  // Initialize
  window.onload = () => {
    checkAlreadyLoggedIn();
    initializeDefaultAccounts();
    
    // Load theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
  };
</script>

</body>
</html>
